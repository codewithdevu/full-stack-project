version: '3.8'

services:
  app:
    build: .
    container_name: mytube-app
    ports:
      - "8000:8000" # 🔥 FIXED: 8000 outside maps strictly to 8000 inside the container!
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=8000 # Force internal container injection
    networks:
      - mytube-network
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: mytube-worker
    command: npm run worker
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - mytube-network
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: mytube-redis
    ports:
      - "6379:6379"
    networks:
      - mytube-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  mytube-network:
    driver: bridge